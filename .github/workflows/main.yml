name: PollEv Tracker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore last hash
        uses: actions/cache@v4
        with:
          path: last_hash.txt
          key: pollev-hash-${{ github.run_id }}
          restore-keys: pollev-hash-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests twilio

      - name: Run tracker
        env:
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          YOUR_NUMBER: ${{ secrets.YOUR_NUMBER }}
        run: python check_pollev.py

      - name: Save updated hash
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_hash.txt
          key: pollev-hash-${{ github.run_id }}
